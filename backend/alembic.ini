[alembic]
script_location = %(here)s/migrations
prepend_sys_path = .
sqlalchemy.url =

# --- Runtime configuration ---
# Database URL must be provided via environment variable.
# Hard failure occurs if not set in env.py.

[alembic:runtime]
timezone = UTC

# --- Logging configuration ---

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = standard

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
propagate = 0

[logger_alembic]
level = INFO
handlers = console
propagate = 0

[handler_console]
class = StreamHandler
level = NOTSET
args = (sys.stderr,)
formatter = standard

[formatter_standard]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S