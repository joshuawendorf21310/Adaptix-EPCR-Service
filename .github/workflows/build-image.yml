name: Build and Push to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 793439286972.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: adaptix-staging-epcr-service
  AWS_ROLE_ARN: arn:aws:iam::793439286972:role/adaptix-staging-github-actions-deploy
  ECS_CLUSTER: adaptix-staging-cluster
  ECS_SERVICE: adaptix-staging-epcr
  CONTAINER_NAME: epcr
  PROD_ECR_REPOSITORY: adaptix-epcr
  PROD_ECS_CLUSTER: adaptix-production
  PROD_ECS_SERVICE: adaptix-production-epcr

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push SHA-pinned image
        id: build
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:8}"
          IMAGE_TAG="main-${SHORT_SHA}"
          IMAGE_URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"

          docker buildx build \
            --push \
            --tag "${IMAGE_URI}" \
            -f ./backend/Dockerfile.staging \
            ./backend

          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "Built and pushed: ${IMAGE_URI}"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Register new task definition revision with SHA-pinned image
        id: register-td
        run: |
          IMAGE_URI="${{ needs.build.outputs.image_uri }}"

          # Read current task definition
          CURRENT_TD=$(aws ecs describe-task-definition \
            --task-definition "${{ env.ECS_SERVICE }}" \
            --query 'taskDefinition' \
            --output json)

          # Inject new image into container definition
          NEW_TD=$(echo "$CURRENT_TD" | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              if c['name'] == '${{ env.CONTAINER_NAME }}':
                  c['image'] = '$IMAGE_URI'
          # Strip fields not accepted by register-task-definition
          for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                      'compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          print(json.dumps(td))
          ")

          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "new_td_arn=${NEW_TD_ARN}" >> "$GITHUB_OUTPUT"
          echo "Registered task definition: ${NEW_TD_ARN}"

      - name: Wire ALB target group if missing (one-time migration)
        id: wire-lb
        run: |
          # The EPCR target group already exists on the staging ALB. If the ECS
          # service was created without a load_balancer entry, tasks never register
          # and all requests get 503. Detect this and recreate the service with the
          # target group wired in.
          TG_ARN="arn:aws:elasticloadbalancing:us-east-1:793439286972:targetgroup/adaptix-staging-epcr/fd0072bb1bee740e"
          CLUSTER="${{ env.ECS_CLUSTER }}"
          SERVICE="${{ env.ECS_SERVICE }}"
          TD_ARN="${{ steps.register-td.outputs.new_td_arn }}"

          LB_COUNT=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'length(services[0].loadBalancers)' \
            --output text 2>/dev/null || echo "0")

          if [ "${LB_COUNT}" = "0" ] || [ "${LB_COUNT}" = "None" ]; then
            echo "No load balancer on service — draining and recreating with ALB wired..."

            # Capture network config BEFORE deleting the service
            SVC_NET=$(aws ecs describe-services \
              --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].networkConfiguration.awsvpcConfiguration' \
              --output json 2>/dev/null || echo 'null')
            SUBNETS=$(echo "$SVC_NET" | python3 -c "import json,sys; d=json.load(sys.stdin); print(','.join(d.get('subnets',[])))" 2>/dev/null || echo "")
            SG=$(echo "$SVC_NET" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('securityGroups',[''])[0])" 2>/dev/null || echo "")
            echo "Captured subnets: ${SUBNETS}"
            echo "Captured SG: ${SG}"

            # Drain then delete
            aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" \
              --desired-count 0 2>/dev/null || true
            aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE" 2>/dev/null || true
            aws ecs delete-service --cluster "$CLUSTER" --service "$SERVICE" \
              --force 2>/dev/null || true

            # Wait for deletion to complete (poll until service is INACTIVE or gone)
            for i in $(seq 1 30); do
              STATUS=$(aws ecs describe-services \
                --cluster "$CLUSTER" --services "$SERVICE" \
                --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
              echo "Delete poll $i: service status = $STATUS"
              if [ "$STATUS" = "INACTIVE" ] || [ "$STATUS" = "None" ] || [ "$STATUS" = "MISSING" ]; then
                echo "Service fully deleted."
                break
              fi
              sleep 10
            done

            # Re-create with load balancer
            aws ecs create-service \
              --cluster "$CLUSTER" \
              --service-name "$SERVICE" \
              --task-definition "$TD_ARN" \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SG}],assignPublicIp=DISABLED}" \
              --load-balancers "targetGroupArn=${TG_ARN},containerName=${{ env.CONTAINER_NAME }},containerPort=8000" \
              --health-check-grace-period-seconds 120 \
              --deployment-configuration "maximumPercent=200,minimumHealthyPercent=50"

            echo "Service recreated with ALB target group wired."
            echo "recreated=true" >> "$GITHUB_OUTPUT"
          else
            echo "ALB already wired (loadBalancers count: ${LB_COUNT}) — updating normally."
            echo "recreated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure EPCR ALB listener rule has priority below backend catch-all
        run: |
          # The staging backend service catches /api/* at priority 10.
          # The EPCR listener rule must have a LOWER number (higher priority)
          # so that /api/v1/epcr/* routes to the EPCR target group first.
          # Target priority: 4 (same as the Terraform module would set).
          TG_ARN="arn:aws:elasticloadbalancing:us-east-1:793439286972:targetgroup/adaptix-staging-epcr/fd0072bb1bee740e"
          ALB_NAME="adaptix-staging-alb"
          DESIRED_PRIORITY=4

          LISTENER_ARN=$(aws elbv2 describe-load-balancers \
            --names "$ALB_NAME" \
            --query 'LoadBalancers[0].LoadBalancerArn' \
            --output text 2>/dev/null || true)

          if [ -z "$LISTENER_ARN" ] || [ "$LISTENER_ARN" = "None" ]; then
            echo "Could not find ALB $ALB_NAME — skipping priority check"
            exit 0
          fi

          LISTENER_ARN=$(aws elbv2 describe-listeners \
            --load-balancer-arn "$LISTENER_ARN" \
            --query 'Listeners[?Protocol==`HTTPS`].ListenerArn | [0]' \
            --output text 2>/dev/null || true)

          if [ -z "$LISTENER_ARN" ] || [ "$LISTENER_ARN" = "None" ]; then
            echo "Could not find HTTPS listener — skipping priority check"
            exit 0
          fi

          RULE_INFO=$(aws elbv2 describe-rules \
            --listener-arn "$LISTENER_ARN" \
            --query "Rules[?Actions[0].TargetGroupArn=='$TG_ARN'].[RuleArn,Priority]" \
            --output text 2>/dev/null || true)

          if [ -z "$RULE_INFO" ]; then
            echo "No EPCR listener rule found on ALB — nothing to fix"
            exit 0
          fi

          RULE_ARN=$(echo "$RULE_INFO" | awk '{print $1}')
          CURRENT_PRIORITY=$(echo "$RULE_INFO" | awk '{print $2}')
          echo "EPCR listener rule: ARN=$RULE_ARN priority=$CURRENT_PRIORITY"

          if [ "$CURRENT_PRIORITY" = "default" ]; then
            echo "Rule is the default rule — skipping"
            exit 0
          fi

          if [ "$CURRENT_PRIORITY" -le "$DESIRED_PRIORITY" ] 2>/dev/null; then
            echo "Priority $CURRENT_PRIORITY is already <= $DESIRED_PRIORITY — no change needed"
          else
            echo "Priority $CURRENT_PRIORITY > $DESIRED_PRIORITY — setting to $DESIRED_PRIORITY"
            aws elbv2 set-rule-priorities \
              --rule-priorities "RuleArn=$RULE_ARN,Priority=$DESIRED_PRIORITY" \
              2>&1 || echo "set-rule-priorities failed — may conflict with existing rule"
          fi

      - name: Update ECS service to new task definition
        if: steps.wire-lb.outputs.recreated != 'true'
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --task-definition "${{ steps.register-td.outputs.new_td_arn }}" \
            --force-new-deployment

          echo "Deployment initiated for ${{ env.ECS_SERVICE }} with ${{ steps.register-td.outputs.new_td_arn }}"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push production image to production ECR
        id: build-prod
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:8}"
          IMAGE_TAG="prod-${SHORT_SHA}"
          PROD_IMAGE_URI="${{ env.ECR_REGISTRY }}/${{ env.PROD_ECR_REPOSITORY }}:${IMAGE_TAG}"

          docker buildx build \
            --push \
            --tag "${PROD_IMAGE_URI}" \
            -f ./backend/Dockerfile.staging \
            ./backend

          echo "prod_image_uri=${PROD_IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "Built and pushed production image: ${PROD_IMAGE_URI}"

      - name: Register production task definition and deploy
        id: register-prod-td
        run: |
          PROD_IMAGE_URI="${{ steps.build-prod.outputs.prod_image_uri }}"

          CURRENT_TD=$(aws ecs describe-task-definition \
            --task-definition "${{ env.PROD_ECS_SERVICE }}" \
            --query 'taskDefinition' \
            --output json)

          NEW_TD=$(echo "$CURRENT_TD" | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              if c['name'] == '${{ env.CONTAINER_NAME }}':
                  c['image'] = '${PROD_IMAGE_URI}'
          for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                      'compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          print(json.dumps(td))
          ")

          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "new_td_arn=${NEW_TD_ARN}" >> "$GITHUB_OUTPUT"
          echo "Registered production task definition: ${NEW_TD_ARN}"

      - name: Print production task definition log configuration
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ env.PROD_ECS_SERVICE }}" \
            --query 'taskDefinition.containerDefinitions[*].{name:name,logConfig:logConfiguration}' \
            --output json 2>&1 || echo "Could not fetch task definition"

      - name: Ensure CloudWatch log group exists for migration task logs
        run: |
          aws logs create-log-group \
            --log-group-name "/adaptix/production/epcr" \
            --region "${{ env.AWS_REGION }}" 2>&1 || true
          echo "Log group /adaptix/production/epcr ready."

      - name: Run production database migrations (alembic upgrade head)
        env:
          PROD_PRIVATE_SUBNET_IDS: ${{ secrets.PROD_PRIVATE_SUBNET_IDS }}
          PROD_EPCR_SECURITY_GROUP_ID: ${{ secrets.PROD_EPCR_SECURITY_GROUP_ID }}
        run: |
          if [ -z "${PROD_PRIVATE_SUBNET_IDS}" ] || [ -z "${PROD_EPCR_SECURITY_GROUP_ID}" ]; then
            echo "::error::PROD_PRIVATE_SUBNET_IDS and PROD_EPCR_SECURITY_GROUP_ID secrets must be set."
            echo "::error::These are required to run alembic upgrade head before the new task definition is rolled out."
            exit 1
          fi

          NEW_TD_ARN="${{ steps.register-prod-td.outputs.new_td_arn }}"

          # Strip revision suffix to register-task-definition family form
          # for run-task; ECS accepts the full ARN directly.
          OVERRIDES=$(python3 -c "
          import json
          print(json.dumps({
            'containerOverrides': [{
              'name': '${{ env.CONTAINER_NAME }}',
              'command': [
                'sh', '-c',
                'cd /app && python3 migrations/pre_stamp_if_untracked.py && alembic upgrade head'
              ]
            }]
          }))
          ")

          NETWORK_CFG=$(python3 -c "
          import json, os
          subnets = [s.strip() for s in os.environ['PROD_PRIVATE_SUBNET_IDS'].split(',') if s.strip()]
          sg = os.environ['PROD_EPCR_SECURITY_GROUP_ID'].strip()
          print(json.dumps({
            'awsvpcConfiguration': {
              'subnets': subnets,
              'securityGroups': [sg],
              'assignPublicIp': 'DISABLED'
            }
          }))
          ")

          echo "Launching alembic upgrade head as one-shot Fargate task..."
          RUN_OUT=$(aws ecs run-task \
            --cluster "${{ env.PROD_ECS_CLUSTER }}" \
            --task-definition "${NEW_TD_ARN}" \
            --launch-type FARGATE \
            --network-configuration "${NETWORK_CFG}" \
            --overrides "${OVERRIDES}" \
            --output json)

          TASK_ARN=$(echo "${RUN_OUT}" | python3 -c "import json,sys;d=json.load(sys.stdin);print(d['tasks'][0]['taskArn'])")
          if [ -z "${TASK_ARN}" ] || [ "${TASK_ARN}" = "None" ]; then
            echo "::error::Failed to launch migration task"
            echo "${RUN_OUT}"
            exit 1
          fi
          echo "Migration task launched: ${TASK_ARN}"

          echo "Waiting for migration task to stop..."
          aws ecs wait tasks-stopped \
            --cluster "${{ env.PROD_ECS_CLUSTER }}" \
            --tasks "${TASK_ARN}"

          STOP_OUT=$(aws ecs describe-tasks \
            --cluster "${{ env.PROD_ECS_CLUSTER }}" \
            --tasks "${TASK_ARN}" \
            --output json)

          EXIT_CODE=$(echo "${STOP_OUT}" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          t = d['tasks'][0]
          for c in t.get('containers', []):
              if c.get('name') == '${{ env.CONTAINER_NAME }}':
                  print(c.get('exitCode', '1'))
                  break
          else:
              print('1')
          ")
          STOP_REASON=$(echo "${STOP_OUT}" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          print(d['tasks'][0].get('stoppedReason', ''))
          ")
          CONTAINER_REASON=$(echo "${STOP_OUT}" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          t = d['tasks'][0]
          for c in t.get('containers', []):
              if c.get('name') == 'epcr':
                  print(c.get('reason', 'no container reason'))
                  break
          else:
              print('epcr container not found in task')
          ")

          echo "Migration task exit code: ${EXIT_CODE}"
          echo "Migration task stop reason: ${STOP_REASON}"
          echo "Migration container reason: ${CONTAINER_REASON}"
          echo "--- Full task state ---"
          echo "${STOP_OUT}" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          t = d['tasks'][0]
          print('Task status:', t.get('lastStatus'))
          print('Stopped reason:', t.get('stoppedReason'))
          for c in t.get('containers', []):
              print(f'Container {c.get(\"name\")}: status={c.get(\"lastStatus\")} exitCode={c.get(\"exitCode\")} reason={c.get(\"reason\",\"\")}')
          "

          if [ "${EXIT_CODE}" != "0" ]; then
            echo "::error::alembic upgrade head failed (exit ${EXIT_CODE}). Aborting deploy."
            TASK_ID="${TASK_ARN##*/}"
            LOG_GROUP="/adaptix/production/epcr"
            sleep 10
            echo "--- Listing log streams in ${LOG_GROUP} for task ${TASK_ID} ---"
            aws logs describe-log-streams \
              --log-group-name "${LOG_GROUP}" \
              --log-stream-name-prefix "ecs/epcr/${TASK_ID}" \
              --region "${{ env.AWS_REGION }}" \
              --output json 2>&1 || echo "Could not list log streams"
            # awslogs-stream-prefix=ecs, container=epcr → stream: ecs/epcr/{taskId}
            STREAM="ecs/epcr/${TASK_ID}"
            echo "--- Fetching: ${LOG_GROUP}/${STREAM} ---"
            aws logs get-log-events \
              --log-group-name "${LOG_GROUP}" \
              --log-stream-name "${STREAM}" \
              --region "${{ env.AWS_REGION }}" \
              --query 'events[*].message' \
              --output text 2>&1 || echo "Could not fetch log stream"
            exit 1
          fi

          echo "Production migrations applied successfully."

      - name: Update production ECS service to new task definition
        run: |
          NEW_TD_ARN="${{ steps.register-prod-td.outputs.new_td_arn }}"
          aws ecs update-service \
            --cluster "${{ env.PROD_ECS_CLUSTER }}" \
            --service "${{ env.PROD_ECS_SERVICE }}" \
            --task-definition "${NEW_TD_ARN}" \
            --force-new-deployment

          echo "Production deployment initiated for ${{ env.PROD_ECS_SERVICE }}"

      - name: Wait for production ECS service to reach steady state
        run: |
          echo "Waiting for ${{ env.PROD_ECS_SERVICE }} to reach steady state..."
          aws ecs wait services-stable \
            --cluster "${{ env.PROD_ECS_CLUSTER }}" \
            --services "${{ env.PROD_ECS_SERVICE }}"
          echo "Production service ${{ env.PROD_ECS_SERVICE }} is stable."


  diagnose-staging:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Diagnose staging EPCR target group health
        run: |
          CLUSTER="${{ env.ECS_CLUSTER }}"
          SERVICE="${{ env.ECS_SERVICE }}"
          TG_ARN="arn:aws:elasticloadbalancing:us-east-1:793439286972:targetgroup/adaptix-staging-epcr/fd0072bb1bee740e"
          sleep 90
          echo "=== Service Status ==="
          aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].{status:status,desired:desiredCount,running:runningCount,pending:pendingCount,events:events[:3]}' \
            --output json 2>&1 || true
          echo "=== Target Group Health ==="
          aws elbv2 describe-target-health --target-group-arn "$TG_ARN" --output json 2>&1 || true
          echo "=== TG Health Check Config ==="
          aws elbv2 describe-target-groups --target-group-arns "$TG_ARN" \
            --query 'TargetGroups[0].{HealthCheckPath:HealthCheckPath,HealthCheckPort:HealthCheckPort,Matcher:Matcher}' \
            --output json 2>&1 || true
