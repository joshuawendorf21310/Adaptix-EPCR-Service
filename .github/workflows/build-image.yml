name: Build and Push to ECR

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 793439286972.dkr.ecr.us-east-1.amazonaws.com
  AWS_ROLE_ARN: arn:aws:iam::793439286972:role/adaptix-staging-github-actions-deploy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - run: |
          docker buildx build --push --tag ${{ env.ECR_REGISTRY }}/adaptix-staging-epcr-service:latest .
